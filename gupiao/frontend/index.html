<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票/基金数据监控面板 - 登录</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>股票/基金数据监控面板</h1>
                <p class="auth-subtitle">监控自选标的，掌握市场动态</p>
            </div>

            <div class="auth-tabs">
                <button id="login-tab" class="auth-tab active" onclick="switchTab('login')">登录</button>
                <button id="register-tab" class="auth-tab" onclick="switchTab('register')">注册</button>
            </div>

            <!-- 登录表单 -->
            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="login-email">邮箱</label>
                    <input
                        type="email"
                        id="login-email"
                        name="email"
                        placeholder="请输入邮箱"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="login-password">密码</label>
                    <input
                        type="password"
                        id="login-password"
                        name="password"
                        placeholder="请输入密码"
                        required
                    >
                </div>

                <button type="submit" class="btn btn-primary btn-block">登录</button>

                <div class="form-footer">
                    <a href="#" onclick="switchTab('register')">还没有账号？立即注册</a>
                </div>
            </form>

            <!-- 注册表单 -->
            <form id="register-form" class="auth-form" style="display: none;">
                <div class="form-group">
                    <label for="register-email">邮箱</label>
                    <input
                        type="email"
                        id="register-email"
                        name="email"
                        placeholder="请输入邮箱"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="register-nickname">昵称（可选）</label>
                    <input
                        type="text"
                        id="register-nickname"
                        name="nickname"
                        placeholder="请输入昵称"
                    >
                </div>

                <div class="form-group">
                    <label for="register-password">密码</label>
                    <input
                        type="password"
                        id="register-password"
                        name="password"
                        placeholder="请输入密码（至少6位）"
                        minlength="6"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="register-password-confirm">确认密码</label>
                    <input
                        type="password"
                        id="register-password-confirm"
                        name="password_confirm"
                        placeholder="请再次输入密码"
                        required
                    >
                </div>

                <button type="submit" class="btn btn-primary btn-block">注册</button>

                <div class="form-footer">
                    <a href="#" onclick="switchTab('login')">已有账号？立即登录</a>
                </div>
            </form>

            <div id="message" class="message"></div>
        </div>

        <div class="disclaimer">
            <h3>免责声明</h3>
            <p>本工具仅提供金融数据参考，不构成任何投资建议。投资者据此操作，风险自担。市场有风险，投资需谨慎。</p>
        </div>
    </div>

    <script src="/static/js/auth.js"></script>
</body>
</html>
