{% extends 'base.html' %}
{% block title %}标签管理{% endblock %}
{% block content %}
<h2 class="mb-3">标签管理</h2>
<div class="row g-4">
  <div class="col-md-4">
    <div class="card mb-3"><div class="card-body">
      <form method="post" action="{{ url_for('admin.tags') }}">
        <div class="mb-2"><label class="form-label">标签名</label><input class="form-control" name="name" required></div>
        <button class="btn btn-primary w-100">新增标签</button>
      </form>
    </div></div>

    <div class="card">
      <div class="card-header">标签合并</div>
      <div class="card-body">
        <form method="post" action="{{ url_for('admin.tags_merge') }}">
          <div class="mb-2"><label class="form-label">源标签</label>
            <select class="form-select" name="source_id" required>{% for t in tags %}<option value="{{ t.id }}">{{ t.name }}</option>{% endfor %}</select>
          </div>
          <div class="mb-2"><label class="form-label">目标标签</label>
            <select class="form-select" name="target_id" required>{% for t in tags %}<option value="{{ t.id }}">{{ t.name }}</option>{% endfor %}</select>
          </div>
          <button class="btn btn-outline-primary w-100">执行合并</button>
        </form>
      </div>
    </div>
  </div>

  <div class="col-md-8">
    <form method="post" action="{{ url_for('admin.tags_delete_batch') }}" onsubmit="return confirm('确认批量删除选中标签？')">
      <table class="table table-striped">
        <thead><tr><th><input type="checkbox" onclick="document.querySelectorAll('input[name=tag_ids]').forEach(i=>i.checked=this.checked)"></th><th>ID</th><th>名称</th></tr></thead>
        <tbody>
        {% for t in tags %}
        <tr><td><input type="checkbox" name="tag_ids" value="{{ t.id }}"></td><td>{{ t.id }}</td><td>{{ t.name }}</td></tr>
        {% endfor %}
        </tbody>
      </table>
      <button class="btn btn-outline-danger">批量删除</button>
    </form>
  </div>
</div>
{% endblock %}
