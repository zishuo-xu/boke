{% extends 'base.html' %}
{% block title %}注册 - 学习博客{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card auth-card">
      <div class="card-header">注册</div>
      <div class="card-body">
        <form method="post">
          <div class="mb-3">
            <label class="form-label">用户名</label>
            <input class="form-control" name="username" minlength="3" required>
          </div>
          <div class="mb-3">
            <label class="form-label">密码</label>
            <input class="form-control" type="password" name="password" minlength="6" required>
          </div>
          <div class="mb-3">
            <label class="form-label">确认密码</label>
            <input class="form-control" type="password" name="confirm_password" minlength="6" required>
          </div>
          <button class="btn btn-primary w-100" type="submit">注册并登录</button>
        </form>
        <div class="auth-switch mt-3 text-center text-muted">
          已有账号？
          <a href="{{ url_for('auth.login') }}">去登录</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
