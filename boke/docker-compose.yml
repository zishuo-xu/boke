services:
  blog:
    build: .
    container_name: boke-blog
    ports:
      - "5000:5000"
    environment:
      SECRET_KEY: "change-this-in-production"
      ADMIN_USERNAMES: "admin"
      ADMIN_USERNAME: "admin"
      ADMIN_PASSWORD: "admin123"
    volumes:
      - ./docker-data/instance:/app/instance
      - ./docker-data/uploads:/app/app/static/uploads
    restart: unless-stopped
